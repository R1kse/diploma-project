<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Paidaly — дизайн приложения</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  body { background: #E5ECE0; }
  .dc-shell-header .title { font-family: 'Unbounded', sans-serif !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="client.jsx"></script>
<script type="text/babel" src="courier.jsx"></script>
<script type="text/babel" src="dispatcher.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="Paidaly — доставка здоровой еды" subtitle="Клиент · Курьер · Диспетчер">

      <DCSection id="client" title="Клиент · iOS">
        <DCArtboard id="c1" label="Онбординг"      width={360} height={740}><ClientOnboarding/></DCArtboard>
        <DCArtboard id="c2" label="Главная"        width={360} height={740}><ClientHome/></DCArtboard>
        <DCArtboard id="c3" label="Меню"           width={360} height={740}><ClientMenu/></DCArtboard>
        <DCArtboard id="c4" label="Карточка блюда" width={360} height={740}><ClientDish/></DCArtboard>
        <DCArtboard id="c5" label="Корзина"        width={360} height={740}><ClientCart/></DCArtboard>
        <DCArtboard id="c6" label="Оформление"     width={360} height={740}><ClientCheckout/></DCArtboard>
        <DCArtboard id="c7" label="Трекер + карта" width={360} height={740}><ClientTracker/></DCArtboard>
        <DCArtboard id="c8" label="История"        width={360} height={740}><ClientHistory/></DCArtboard>
        <DCArtboard id="c9" label="Профиль"        width={360} height={740}><ClientProfile/></DCArtboard>
      </DCSection>

      <DCSection id="courier" title="Курьер · Dark mode">
        <DCArtboard id="k1" label="Список заказов" width={360} height={740}><CourierList/></DCArtboard>
        <DCArtboard id="k2" label="Детали заказа"  width={360} height={740}><CourierDetails/></DCArtboard>
        <DCArtboard id="k3" label="Карта маршрута" width={360} height={740}><CourierRoute/></DCArtboard>
        <DCArtboard id="k4" label="Статистика"     width={360} height={740}><CourierStats/></DCArtboard>
      </DCSection>

      <DCSection id="dispatcher" title="Диспетчер · Web">
        <DCArtboard id="d1" label="Дашборд"           width={1280} height={820}><DispatcherDashboard/></DCArtboard>
        <DCArtboard id="d2" label="Таблица заказов"   width={1280} height={820}><DispatcherOrders/></DCArtboard>
        <DCArtboard id="d3" label="Карта курьеров"    width={1280} height={820}><DispatcherMap/></DCArtboard>
        <DCArtboard id="d4" label="Детали заказа"     width={1280} height={820}><DispatcherOrderDetail/></DCArtboard>
        <DCArtboard id="d5" label="Назначение курьера" width={1280} height={820}><DispatcherAssign/></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
